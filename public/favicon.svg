<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background — deep ink -->
  <rect width="32" height="32" fill="#0E0D0B"/>

  <!-- Thin gold border rule -->
  <rect x="1.5" y="1.5" width="29" height="29" stroke="#B8922A" stroke-width="0.75" fill="none"/>

  <!-- Q letterform — Cormorant-inspired serif, light weight -->
  <!-- Main circle of Q -->
  <circle cx="13" cy="16" r="7.5" stroke="#F0EDE6" stroke-width="1" fill="none"/>
  <!-- Q tail — the diagonal stroke that makes it a Q -->
  <line x1="18" y1="20" x2="22" y2="24" stroke="#B8922A" stroke-width="1.5" stroke-linecap="square"/>

  <!-- N letterform — clean geometric -->
  <!-- Left vertical -->
  <line x1="20" y1="10" x2="20" y2="18" stroke="#F0EDE6" stroke-width="1" stroke-linecap="square"/>
  <!-- Diagonal -->
  <line x1="20" y1="10" x2="26" y2="18" stroke="#F0EDE6" stroke-width="1" stroke-linecap="square"/>
  <!-- Right vertical -->
  <line x1="26" y1="10" x2="26" y2="18" stroke="#F0EDE6" stroke-width="1" stroke-linecap="square"/>

  <!-- Gold accent dot — bottom centre -->
  <rect x="14.5" y="27" width="3" height="1" fill="#B8922A"/>
</svg>
